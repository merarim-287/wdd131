<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Mexico</h1>
        <div></div>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
        
                <img src="images/hero-small.webp" alt="country" width="1500" height="750">
            </picture> 
        </div>
        <div class="icon">     
        <img src="images/weather-icon.svg" alt="weather-icon">
    </div>
    <article>
        <h2>Data</h2>
        <ul>
            <li class="area"></li>
            <li class="population"></li>
            <li class="capital"></li>
            <li class="languages"></li>
            <li class="currency"></li>
            <li class="time-zone"></li>
            <li class="calling-code"></li>
            <li class="internet-tld"></li>
        </ul>
    </article>

    </main>

    <footer>
        <p>©<span id="currentYear"></span> ✨Merari M. Gonzalez ✨ Utah, EU</p>
        <p>Last Modified on: <span id="lastModified"></span></p>
    </footer>
    
</body>
</html>
